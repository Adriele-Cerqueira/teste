<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Analista de Dados</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0d1117;
      color: #e6edf3;
    }

    header {
      text-align: center;
      padding: 60px 20px;
      border-bottom: 1px dashed #30363d;
    }

    header h1 {
      font-size: 42px;
      margin: 0;
      letter-spacing: 2px;
    }

    header p {
      color: #8b949e;
      margin-top: 10px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 40px 20px;
    }

    .projeto {
      background-color: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 30px;
      transition: 0.3s;
    }

    .projeto:hover {
      transform: translateY(-5px);
      border-color: #58a6ff;
    }

    .projeto h2 {
      margin-top: 0;
      color: #58a6ff;
    }

    iframe {
      border-radius: 8px;
      border: none;
      margin-top: 15px;
    }

    footer {
      text-align: center;
      padding: 20px;
      border-top: 1px dashed #30363d;
      color: #8b949e;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <header>
    <h1>ANALISTA DE DADOS</h1>
    <p>Projetos e dashboards interativos</p>
  </header>

  <div class="container">

    <div class="projeto">
      <h2>📊 Dashboard de Vendas</h2>
      <p>Análise de desempenho comercial com Power BI.</p>

      <iframe width="100%" height="500"
        src="https://app.powerbi.com/reportEmbed?reportId=ffece00a-ac05-4a72-ab7a-c916be8e60e9&autoAuth=true&ctid=00c7c70c-69ef-4084-9f42-d4439937664f"
        allowFullScreen="true">
      </iframe>
    </div>

  </div>

  <footer>
    © 2026 - Seu Portfólio de Dados
  </footer>

</body>
</html>
